services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hubrl-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/hubrl}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: hubrl-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
